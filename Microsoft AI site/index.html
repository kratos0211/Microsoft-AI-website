<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Copilot Promotion Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #0078d4 0%, #50e6ff 100%); }
        .chat-bubble-ai { border-bottom-left-radius: 2px; }
        .chat-bubble-user { border-bottom-right-radius: 2px; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg p-6 text-center">
        <h1 class="text-3xl font-bold">Microsoft Copilot Promo Center</h1>
        <p class="mt-2 opacity-90">Claim your free licenses and learn about AI-driven productivity.</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 p-6">
        
        <!-- Section 1: Registration -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <span class="mr-2 text-blue-600">🛡️</span> Registration
            </h2>
            <form id="regForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Company Name</label>
                    <input type="text" id="company" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter company name" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Business Email (Entra ID)</label>
                    <input type="email" id="email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="name@company.com" required>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:shadow-lg transition">
                    Apply for Free License
                </button>
            </form>
            <div id="regStatus" class="mt-4 hidden p-3 rounded-lg text-sm"></div>
        </section>

        <!-- Section 2: AI Chatbot -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[600px]">
            <div class="p-4 border-b bg-slate-50 flex items-center justify-between">
                <h2 class="font-bold text-slate-800">Copilot Expert Chat</h2>
                <span class="text-xs text-green-600 font-bold px-2 py-1 bg-green-100 rounded-full">AOAI SECURED</span>
            </div>
            
            <div id="chatWindow" class="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50/50">
                <div class="bg-blue-100 text-blue-900 p-3 rounded-2xl chat-bubble-ai max-w-[80%] text-sm shadow-sm">
                    Hello! I can answer questions about Microsoft Copilot pricing, licensing, and features. How can I help?
                </div>
            </div>

            <div class="p-4 bg-white border-t rounded-b-2xl">
                <div class="flex gap-2">
                    <input type="text" id="chatInput" class="flex-grow p-3 border rounded-full outline-none focus:ring-2 focus:ring-blue-400" placeholder="Type your question...">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Registration Form Handling
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('regStatus');
            status.className = "mt-4 p-3 rounded-lg text-sm bg-blue-50 text-blue-700";
            status.innerText = "Processing your request...";
            status.classList.remove('hidden');

            // Logic for license provisioning via Azure Functions would go here
            setTimeout(() => {
                status.className = "mt-4 p-3 rounded-lg text-sm bg-green-50 text-green-700";
                status.innerText = "Success! An activation link has been sent to your Entra ID email.";
            }, 1500);
        };

        // Chatbot Logic
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const chatWindow = document.getElementById('chatWindow');
            const prompt = input.value.trim();
            if (!prompt) return;

            // Display User Message
            addMessage(prompt, 'user');
            input.value = '';

            try {
                // Call our SECURE Backend Proxy (The Azure Function)
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                addMessage(data.answer, 'ai');
            } catch (err) {
                addMessage("I'm having trouble connecting. Please check if the API is configured.", 'error');
            }
        }

        function addMessage(text, type) {
            const chatWindow = document.getElementById('chatWindow');
            const div = document.createElement('div');
            const isUser = type === 'user';
            
            div.className = isUser 
                ? "bg-slate-700 text-white p-3 rounded-2xl chat-bubble-user max-w-[80%] text-sm self-end ml-auto shadow-sm"
                : "bg-blue-100 text-blue-900 p-3 rounded-2xl chat-bubble-ai max-w-[80%] text-sm shadow-sm";
            
            if(type === 'error') div.className = "bg-red-100 text-red-700 p-3 rounded-lg text-xs mx-auto text-center w-full";
            
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
